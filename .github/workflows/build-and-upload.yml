name: Build and Upload to App Store Connect

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install npm dependencies
        run: npm install
      
      - name: Build Vite app
        run: npm run build
      
      - name: Install Capacitor CLI
        run: npm install @capacitor/core @capacitor/cli
      
      - name: Add iOS platform
        run: npx cap add ios
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      
      - name: Install fastlane
        run: gem install fastlane
      
      - name: Build and upload to App Store Connect
        env:
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEY_P8: ${{ secrets.APPLE_KEY_P8 }}
        run: |
          cd ios/App
          fastlane build_and_upload
